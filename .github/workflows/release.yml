name: Release Asset Generator

on:
  release:
    types: [created]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required permission to upload assets to the Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Automatically caches node_modules to speed up subsequent runs

      - name: Install dependencies
        run: npm ci # Uses 'npm ci' for clean and reliable installations based on package-lock.json

      - name: Run build script
        run: npm run generate

      - name: Zip dist folder contents
        # Navigates into the 'dist' folder and compresses everything inside, 
        # ensuring the zip file does not contain the root 'dist/' folder itself.
        run: |
          cd dist
          zip -r ../release-dist.zip .
          cd ..

      - name: Upload Zip to Release Resource
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub to authorize the upload
