name: Release Asset Generator

on:
  release:
    types: [created]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required permission to upload assets to the Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn' # Automatically caches Yarn packages to speed up subsequent runs

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Run build script
        run: yarn generate

      - name: Zip dist folder contents
        # Navigates into the 'dist' folder and compresses everything inside,
        # ensuring the zip file does not contain the root 'dist/' folder itself.
        run: |
          cd dist
          zip -r "${{ github.workspace }}/release-dist.zip" .

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} "${{ github.workspace }}/release-dist.zip" --clobber
